<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentTeams</title>
  <script type="module" src="/src/main.ts"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f0f1a;
      color: #e0e0e0;
    }

    .loading-container h1 { font-size: 24px; margin-bottom: 16px; }
    .loading-container p { color: #888; font-size: 14px; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top: 3px solid #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4e;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #888;
      z-index: 100;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.online { background: #4caf50; }
    .status-dot.offline { background: #f44336; }
    .status-dot.checking { background: #ff9800; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-container" id="loading">
      <div class="spinner"></div>
      <h1>AgentTeams</h1>
      <p id="loading-text">正在启动服务...</p>
    </div>
  </div>
  <div class="status-bar">
    <span class="status-dot checking" id="runtime-dot"></span>
    <span id="runtime-status">Runtime: 检测中...</span>
    <span style="margin-left: auto;" id="version-info"></span>
  </div>
</body>
</html>
